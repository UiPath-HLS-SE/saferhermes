# Fluent-bit collector for openclaw. Ingests openclaw logs and pushes them to a log ingestion endpoint.
# Will be appended to the main fluent-bit configuration.
service:
  flush: 1
  log_level: info
  parsers_file: parsers.yaml

pipeline:
  inputs:
    - name: systemd
      tag: openclaw-gateway.log
      systemd_filter: _SYSTEMD_UNIT=openclaw.service
  outputs:
    - name: azure_blob
      match: openclaw-gateway.log
      auth_type: sas
      account_name: ${AZURE_BLOB_ACCOUNT_NAME}
      sas_token: ${AZURE_STORAGE_SAS_TOKEN}
      container_name: ${AZURE_BLOB_CONTAINER_NAME}
      auto_create_container: false
      workers: 1
      compress: gzip
      tls: on
