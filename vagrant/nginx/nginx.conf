worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 64;
}

http {
    lua_shared_dict token_cache 1m;

    server {
        listen 80;

        location / {
            access_by_lua_block {
                local cache = ngx.shared.token_cache
                local expired = cache:get("expired")

                if expired == nil then
                    local f = io.open("/etc/fluent-bit/azure-monitor.env", "r")
                    if not f then
                        expired = true
                    else
                        local content = f:read("*a")
                        f:close()
                        local expiry = content:match("se=(%d%d%d%d%-%d%d%-%d%d)")
                        local today = os.date("%Y-%m-%d")
                        expired = not expiry or expiry <= today
                    end

                    cache:set("expired", expired, 86400)
                end

                if expired then
                    ngx.exit(503)
                end
            }

            proxy_pass http://127.0.0.1:18789;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        error_page 503 /token-expired.html;
        location = /token-expired.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
